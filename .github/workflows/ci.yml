name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check the app actually imports
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: ci-placeholder-secret-key-at-least-32-chars
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
        run: uv run python -c "from app.main import app; print(f'{len(app.routes)} routes OK')"

      - name: Run tests
        run: uv run pytest -q
