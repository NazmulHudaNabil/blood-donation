services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdnazmulhudanabil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-blood_donation}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdnazmulhudanabil} -d ${POSTGRES_DB:-blood_donation}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overrides whatever DATABASE_URL is in .env — inside compose's network the
      # db is reachable at the "db" hostname, never at localhost.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mdnazmulhudanabil}:${POSTGRES_PASSWORD:-123456}@db:5432/${POSTGRES_DB:-blood_donation}
    command: sh -c "uv run alembic upgrade head && uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./alembic:/app/alembic
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
